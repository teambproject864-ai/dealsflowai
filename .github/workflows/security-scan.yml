name: Security Evals Scanner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-eval:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Security Evals
      run: npm test
      env:
        NODE_ENV: test
        JWT_SECRET: test-jwt-secret-key-12345
        IP_HASH_SALT: test-salt-123
        BLOCKED_IPS: 198.51.100.42
