name: Security Evals Scanner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-eval:
    runs-on: ubuntu-latest
    # node:20 provides Node 20 + npm out of the box — no setup-node action needed.
    # Using a container also eliminates all `uses:` directives, which the
    # GitHub Actions IDE extension cannot validate without live GitHub API access.
    container:
      image: node:20

    steps:
    - name: Checkout Code
      # Raw git checkout via GITHUB_TOKEN — replaces actions/checkout.
      # Works for push and pull_request events on main / master branches.
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git init "$GITHUB_WORKSPACE"
        cd "$GITHUB_WORKSPACE"
        git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
        git checkout FETCH_HEAD
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Install Dependencies
      run: npm ci

    - name: Run Security Evals
      run: npm test
      env:
        NODE_ENV: test
        JWT_SECRET: test-jwt-secret-key-12345
        IP_HASH_SALT: test-salt-123
        BLOCKED_IPS: 198.51.100.42
