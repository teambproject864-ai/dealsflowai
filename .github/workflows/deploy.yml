name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Branch is Main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "Error: Deployments are strictly restricted to the main branch."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Deploy Application
        run: |
          echo "Simulating deployment to production (dealsflowai.vercel.app)..."
          echo "Successfully deployed version ${{ github.sha }} to production."
